services:
  mysql:
    image: mysql:8.4
    container_name: medical-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_dev_password
      MYSQL_DATABASE: medical_retrieval
      MYSQL_USER: medical
      MYSQL_PASSWORD: medical_dev_password
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - medical_mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-umedical", "-pmedical_dev_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: medical-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - medical_etcd_data:/etcd

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: medical-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - medical_minio_data:/minio_data

  milvus:
    image: milvusdb/milvus:v2.5.10
    container_name: medical-milvus
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - medical_milvus_data:/var/lib/milvus
    depends_on:
      - etcd
      - minio

volumes:
  medical_mysql_data:
  medical_etcd_data:
  medical_minio_data:
  medical_milvus_data:
